<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>AI学習プラン提案</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 16px;
        }

        textarea {
            width: 100%;
            height: 80px;
        }

        button {
            margin-top: 8px;
            padding: 8px 16px;
        }

        #result {
            margin-top: 16px;
            white-space: pre-wrap;
            background: #f4f4f4;
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>AI学習プラン提案</h1>
    <p>学びたいことと使える時間を入力してください。</p>
    <textarea id="input" placeholder="例：3か月でWeb開発の基礎を学びたい。平日1時間使える。"></textarea>
    <button id="btn">提案してもらう</button>
    <div id="result"></div>

    <script>
        const API_KEY = "APIキーを入力";
        const MODEL = "gemini-2.5-flash-lite";

        const btn = document.getElementById("btn");
        const result = document.getElementById("result");

        btn.addEventListener("click", async () => {
            const userText = document.getElementById("input").value;
            if (!userText) return;
            result.textContent = "考え中...";

            const prompt = `あなたは学習プランの専門家です。次の希望に合わせて、週単位の具体的な学習プランを提案してください。\n希望：${userText}`;

            try {
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
                    }
                );
                const data = await res.json();
                console.log(data);

                if (data.error) {
                    result.textContent = "APIエラー: " + data.error.message;
                    return;
                }

                result.textContent = data.candidates[0].content.parts[0].text;
            } catch (e) {
                result.textContent = "エラー: " + e.message;
                console.log(e);
            }
        });
    </script>
</body>

</html>
